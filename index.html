<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnnoZzero — Gruppo Musicale</title>
  <meta name="description" content="AnnoZzero gruppo musicale — Maria Grazia Bozzini ed Elena Borile. Musica, live, docufilm Ora Sono Vera.">
  <meta name="theme-color" content="#7a1530">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav id="navbar">
    <a href="#" class="nav-logo" id="navLogo"></a>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>
  <div class="mobile-menu" id="mobileMenu"><ul id="mobileNavLinks"></ul></div>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-photo" id="heroPhoto"></div>
    <div class="hero-content" id="heroContent"></div>
    <div class="hero-scroll"><div class="hero-scroll-arrow"></div></div>
  </section>
  <div class="granata-band"></div>

  <!-- Bio -->
  <section class="bio-section" id="bio"><div class="section">
    <div class="section-header reveal"><div class="section-number">01</div><div class="section-title-group"><div class="section-label">Chi siamo</div><h2 class="section-title" id="bioTitle"></h2><div class="section-line"></div></div></div>
    <div class="bio-grid">
      <div class="bio-image reveal" id="bioImage"></div>
      <div class="bio-text reveal" id="bioText"></div>
    </div>
  </div></section>
  <div class="granata-band"></div>

  <!-- Musica -->
  <section class="musica-section" id="musica"><div class="section">
    <div class="section-header reveal"><div class="section-number">02</div><div class="section-title-group"><div class="section-label">Discografia</div><h2 class="section-title" id="musicaTitle"></h2><div class="section-line"></div></div></div>
    <div class="release-grid reveal" id="releaseGrid"></div>
  </div></section>

  <!-- Live -->
  <section class="live-section" id="live"><div class="section">
    <div class="section-header reveal"><div class="section-number">03</div><div class="section-title-group"><div class="section-label">Date</div><h2 class="section-title" id="liveTitle"></h2><div class="section-line"></div></div></div>
    <div class="event-list reveal" id="eventList"></div>
  </div></section>
  <div class="granata-band"></div>

  <!-- Video -->
  <section class="video-section" id="video"><div class="section">
    <div class="section-header reveal"><div class="section-number">04</div><div class="section-title-group"><div class="section-label">Guarda</div><h2 class="section-title" id="videoTitle"></h2><div class="section-line"></div></div></div>
    <div class="video-grid reveal" id="videoGrid"></div>
  </div></section>

  <!-- Press -->
  <section class="press-section" id="press"><div class="section">
    <div class="section-header reveal"><div class="section-number">05</div><div class="section-title-group"><div class="section-label">Rassegna stampa</div><h2 class="section-title" id="pressTitle"></h2><div class="section-line"></div></div></div>
    <div class="press-list reveal" id="pressList"></div>
  </div></section>

  <!-- Shop -->
  <section class="shop-section" id="shop"><div class="section">
    <div class="section-header reveal"><div class="section-number">06</div><div class="section-title-group"><div class="section-label">Merchandising</div><h2 class="section-title" id="shopTitle"></h2><div class="section-line"></div></div></div>
    <div class="shop-grid reveal" id="shopGrid"></div>
  </div></section>
  <div class="granata-band"></div>

  <!-- Contatti -->
  <section class="contact-section" id="contatti"><div class="section">
    <div class="section-header reveal"><div class="section-number">07</div><div class="section-title-group"><div class="section-label">Scrivici</div><h2 class="section-title" id="contactTitle"></h2><div class="section-line"></div></div></div>
    <div class="contact-grid reveal">
      <div class="contact-info-block" id="contactInfo"></div>
      <div>
        <form class="contact-form" id="contactForm">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Nome</label><input type="text" class="form-input" placeholder="Il tuo nome" required></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="La tua email" required></div>
          </div>
          <div class="form-group"><label class="form-label">Oggetto</label><input type="text" class="form-input" placeholder="Oggetto del messaggio"></div>
          <div class="form-group"><label class="form-label">Messaggio</label><textarea class="form-textarea" placeholder="Scrivi il tuo messaggio..." required></textarea></div>
          <button type="submit" class="form-submit">Invia messaggio</button>
        </form>
        <div class="form-success" id="formSuccess">Grazie! Il tuo messaggio è stato inviato. Ti risponderemo al più presto.</div>
      </div>
    </div>
  </div></section>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <script src="app.js"></script>
</body>
</html>
